<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Touchline - מערכת לניהול משחק</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="background-gradient"></div>

    <div class="app-container">
        <!-- אזור עליון - שעון, תאריך ומסך מלא -->
        <header class="top-bar glass-panel">
            <div style="display: flex; align-items: center; gap: 20px;">
                <button id="btn-fullscreen" class="ios-button-small" title="החלף מצב מסך מלא">מסך מלא 🔲</button>
                <div id="live-time" class="time-display">00:00:00</div>
            </div>
            <div id="live-date" class="date-display">טוען תאריך...</div>
        </header>

        <!-- 1. מסך הבית -->
        <main id="home-screen" class="screen active">
            <div class="hero-section glass-panel">
                <div class="logo-container">
                    <h1 class="system-title">T<span class="bouncing-ball" style="display: inline-block;">⚽️</span>uchline</h1>
                </div>
                <p class="subtitle">מערכת ניהול משחק בזמן אמת</p>
                <button id="btn-new-match" class="ios-button primary-action">התחלת משחק חדש</button>
                
                <button id="btn-resume-match" class="ios-button active-match-widget hidden">
                    <div class="pulse-indicator"></div>
                    <span>חזור למשחק הפעיל</span>
                </button>

                <div class="system-info">
                    <span>גרסה 1.2</span> | <span>&copy; 2026 by Idan Biton</span>
                </div>
            </div>
        </main>

        <!-- 2. מסך הגדרות משחק ושחקנים -->
        <main id="setup-screen" class="screen">
            <div class="setup-container glass-panel">
                <h2>הגדרות וסגל שחקנים</h2>
                <form id="setup-form" class="setup-form">
                    <div class="form-row">
                        <div class="form-group">
                            <label>קבוצה יריבה</label>
                            <input type="text" id="opponent-name" required placeholder="לדוגמה: מכבי חיפה">
                        </div>
                        <div class="form-group">
                            <label>משך משחק (דקות)</label>
                            <select id="match-duration">
                                <option value="70" selected>70 דקות</option>
                                <option value="60">60 דקות</option>
                                <option value="90">90 דקות</option>
                            </select>
                        </div>
                    </div>

                    <div class="players-setup-section">
                        <div class="players-header">
                            <label>סגל הקבוצה (שם ומספר)</label>
                            <div class="players-actions">
                                <button type="button" id="btn-load-csv" class="ios-button-small">טען מאקסל (CSV)</button>
                                <input type="file" id="file-csv" accept=".csv" style="display:none;">
                                <button type="button" id="btn-load-default" class="ios-button-small">טען סגל שמור</button>
                            </div>
                        </div>
                        
                        <div id="players-list-container" class="players-list-container"></div>
                        <button type="button" id="btn-add-player" class="ios-button-small add-btn">+ הוסף שחקן</button>
                    </div>
                    
                    <div class="form-actions">
                        <button type="button" id="btn-back-home" class="ios-button secondary-action">חזרה לראשי</button>
                        <button type="submit" class="ios-button primary-action">שמור והמשך להרכב</button>
                    </div>
                </form>
            </div>
        </main>

        <!-- 3. מסך תכנון הרכב -->
        <main id="lineup-screen" class="screen">
            <div class="lineup-container">
                <div class="lineup-header glass-panel">
                    <div style="display: flex; gap: 10px;">
                        <button type="button" id="btn-back-home-lineup" class="ios-button-small secondary-action">ראשי</button>
                        <button type="button" id="btn-back-setup" class="ios-button-small secondary-action">הגדרות</button>
                    </div>
                    <h2>תכנון הרכב פותח</h2>
                    <button id="btn-start-match" class="ios-button primary-action">התחל משחק ⚽️</button>
                </div>

                <div class="lineup-saves glass-panel">
                    <span style="font-weight: bold; margin-left: 10px;">ניהול הרכבים:</span>
                    <button type="button" class="ios-button-small save-lineup" data-slot="1">שמור 1</button>
                    <button type="button" class="ios-button-small load-lineup" data-slot="1">טען 1</button>
                    <span class="divider">|</span>
                    <button type="button" class="ios-button-small save-lineup" data-slot="2">שמור 2</button>
                    <button type="button" class="ios-button-small load-lineup" data-slot="2">טען 2</button>
                    <span class="divider">|</span>
                    <button type="button" class="ios-button-small save-lineup" data-slot="3">שמור 3</button>
                    <button type="button" class="ios-button-small load-lineup" data-slot="3">טען 3</button>
                </div>
                
                <div class="tactical-area">
                    <div id="pitches-container" class="pitches-wrapper">
                        <!-- חצאי המגרשים המוגדלים יופיעו כאן -->
                    </div>
                </div>

                <div class="bench-area glass-panel">
                    <h3>ספסל שחקנים (בחר שחקן ואז לחץ על עמדה)</h3>
                    <div id="bench-players" class="bench-players-list"></div>
                </div>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
