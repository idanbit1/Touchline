<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Touchline - Soccer Management</title>
    <style>
        :root {
            --primary-color: #2e7d32;
            --accent-color: #ffd700;
            --bg-color: #f4f4f9;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        /* עיצוב כותרת הלוגו */
        .header-container {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo {
            font-size: 4rem;
            font-weight: 900;
            color: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 2px;
            margin-bottom: 0;
        }

        .ball {
            display: inline-block;
            width: 50px;
            height: 50px;
            background: white;
            border: 3px solid #333;
            border-radius: 50%;
            position: relative;
            animation: bounce 1.5s infinite ease-in-out;
            background-image: 
                radial-gradient(circle at 50% 50%, transparent 60%, #333 62%),
                linear-gradient(45deg, transparent 45%, #333 48%, #333 52%, transparent 55%),
                linear-gradient(-45deg, transparent 45%, #333 48%, #333 52%, transparent 55%);
            background-size: 100% 100%;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .subtitle {
            font-size: 1.2rem;
            color: #666;
            margin-top: -10px;
            font-weight: 300;
        }

        /* ממשק ניהול */
        .dashboard {
            width: 100%;
            max-width: 800px;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .stat-card {
            background: var(--primary-color);
            color: white;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }

        button {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
            transition: opacity 0.2s;
        }

        button:active {
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <div class="header-container">
        <h1 class="logo">T<span class="ball"></span>uchline</h1>
        <div class="subtitle">By Idan Biton</div>
    </div>

    <div class="dashboard">
        <h2>לוח בקרה - ניהול משחק</h2>
        <div class="stats-grid">
            <div class="stat-card">
                <h3>תוצאה</h3>
                <p id="score">0 - 0</p>
                <button onclick="addGoal()">גול!</button>
            </div>
            <div class="stat-card">
                <h3>זמן משחק</h3>
                <p id="timer">00:00</p>
                <button onclick="toggleTimer()">הפעל/עצור</button>
            </div>
        </div>
    </div>

    <script>
        let score = 0;
        let seconds = 0;
        let timerInterval;
        let isRunning = false;

        function addGoal() {
            score++;
            document.getElementById('score').innerText = score + " - 0";
        }

        function toggleTimer() {
            if (isRunning) {
                clearInterval(timerInterval);
            } else {
                timerInterval = setInterval(() => {
                    seconds++;
                    let mins = Math.floor(seconds / 60).toString().padStart(2, '0');
                    let secs = (seconds % 60).toString().padStart(2, '0');
                    document.getElementById('timer').innerText = `${mins}:${secs}`;
                }, 1000);
            }
            isRunning = !isRunning;
        }
    </script>
</body>
</html>
