<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>TacticalBoard - ניהול משחק</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- רקע דינמי -->
    <div class="background-gradient"></div>

    <div class="app-container">
        <!-- אזור עליון - שעון ותאריך -->
        <header class="top-bar glass-panel">
            <div id="live-time" class="time-display">00:00:00</div>
            <div id="live-date" class="date-display">טוען תאריך...</div>
        </header>

        <!-- מסך הבית -->
        <main id="home-screen" class="screen active">
            <div class="hero-section glass-panel">
                <div class="logo-container">
                    <h1 class="system-title">TacticalBoard</h1>
                    <div class="bouncing-ball">⚽️</div>
                </div>
                <p class="subtitle">מערכת ניהול משחק בזמן אמת</p>
                <button id="btn-new-match" class="ios-button primary-action">ניהול משחק חדש</button>
                <div class="system-info">
                    <span>גרסה 1.0</span> | <span>עודכן לאחרונה: מאי 2026</span>
                </div>
            </div>
        </main>

        <!-- מסך הגדרות משחק (מוסתר כברירת מחדל) -->
           <!-- מסך הגדרות משחק -->
        <main id="setup-screen" class="screen">
            <div class="setup-container glass-panel">
                <h2>הגדרות משחק חדש</h2>
                <form id="setup-form" class="setup-form">
                    <div class="form-row">
                        <div class="form-group">
                            <label>קבוצה יריבה</label>
                            <input type="text" id="opponent-name" required placeholder="לדוגמה: מכבי חיפה">
                        </div>
                        <div class="form-group">
                            <label>מיקום</label>
                            <select id="match-location">
                                <option value="home">בית (מ.ס רובי שפירא)</option>
                                <option value="away">חוץ</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>שיטת משחק</label>
                            <select id="match-format">
                                <option value="2-7v7">2 מגרשים (7 נגד 7)</option>
                                <option value="1-9v9">מגרש אחד (9 נגד 9)</option>
                                <option value="1-11v11">מגרש אחד (11 נגד 11)</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>משך משחק (דקות)</label>
                            <select id="match-duration">
                                <option value="70" selected>70 דקות (35 כל מחצית)</option>
                                <option value="60">60 דקות (30 כל מחצית)</option>
                                <option value="90">90 דקות (45 כל מחצית)</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group full-width">
                        <label>רשימת שחקנים (שם, מספר)</label>
                        <textarea id="players-list" rows="4" placeholder="הדבק כאן רשימה. לדוגמה:&#10;יוסי לוי, 10&#10;דני כהן, 7" required></textarea>
                        <small>הזן כל שחקן בשורה נפרדת. ניתן להעתיק ולהדביק מאקסל.</small>
                    </div>
                    
                    <div class="form-actions">
                        <button type="button" id="btn-back-home" class="ios-button secondary-action">ביטול</button>
                        <button type="submit" class="ios-button primary-action">המשך לשיבוץ הרכב</button>
                    </div>
                </form>
            </div>
        </main>
        
        <!-- מסך תכנון הרכב (הכנה לשלב הבא) -->
        <main id="lineup-screen" class="screen">
            <div class="glass-panel" style="padding: 40px; text-align: center;">
                <h2>תכנון הרכב</h2>
                <p>הנתונים נשמרו בהצלחה! כאן נבנה את תצוגת המגרשים והגרירה.</p>
            </div>
        </main>

    <script src="app.js"></script>
</body>
</html>
